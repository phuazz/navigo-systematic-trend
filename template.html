<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Navigo Systematic Trend — Model Portfolio Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
<style>
:root{
  --bg:#fafaf8; --bg2:#ffffff; --bg3:#f5f5f0; --bg4:#eeeee8; --bg-hover:#f0f0ea;
  --bd:#e2e0d8; --bd2:#d5d3ca; --bd-strong:#c0beb5;
  --t1:#1a1a18; --t2:#5c5c56; --t3:#8a8a82; --t4:#b0b0a8;
  --g:#1a8754; --g2:#22a366; --g-bg:rgba(26,135,84,0.07); --g-bg2:rgba(26,135,84,0.14);
  --r:#c0392b; --r2:#e74c3c; --r-bg:rgba(192,57,43,0.07); --r-bg2:rgba(192,57,43,0.14);
  --b:#2563eb; --b2:#3b82f6; --b-bg:rgba(37,99,235,0.06); --b-bg2:rgba(37,99,235,0.12);
  --a:#b45309; --a-bg:rgba(180,83,9,0.07); --a-bg2:rgba(180,83,9,0.14);
  --p:#7c3aed; --p-bg:rgba(124,58,237,0.06);
  --c:#0891b2; --c-bg:rgba(8,145,178,0.06);
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px rgba(0,0,0,0.05),0 2px 4px rgba(0,0,0,0.04);
  --radius:8px; --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;padding:0 22px 60px}
.shell{max-width:1280px;margin:0 auto}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.pos{color:var(--g)} .neg{color:var(--r)} .muted{color:var(--t3)}
a{color:var(--b);text-decoration:none}

/* stale banner */
.stale-banner{margin:16px 0 0;padding:12px 18px;border-radius:var(--radius);font-weight:600;font-size:13px;
  display:flex;align-items:center;gap:10px}
.stale-banner.warn{background:var(--a-bg2);color:var(--a);border:1px solid rgba(180,83,9,0.3)}
.stale-banner.stale{background:var(--r-bg2);color:var(--r);border:1px solid rgba(192,57,43,0.35)}

/* masthead */
.masthead{padding:26px 0 20px;border-bottom:2px solid var(--t1);margin-bottom:22px;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px}
.mh-left h1{font-family:var(--serif);font-size:34px;font-weight:400;letter-spacing:-0.4px;line-height:1.05}
.mh-sub{color:var(--t2);font-size:14px;margin-top:4px;max-width:640px}
.mh-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);white-space:nowrap}
.pill-paper{background:var(--a-bg);color:var(--a);border-color:rgba(180,83,9,0.3)}
.pill-on{background:var(--g-bg);color:var(--g);border-color:rgba(26,135,84,0.3)}
.pill-off{background:var(--r-bg);color:var(--r);border-color:rgba(192,57,43,0.3)}
.pill-health-ok{background:var(--g-bg);color:var(--g);border-color:rgba(26,135,84,0.3)}
.pill-health-warn{background:var(--a-bg);color:var(--a);border-color:rgba(180,83,9,0.3)}
.pill-health-stale{background:var(--r-bg);color:var(--r);border-color:rgba(192,57,43,0.3)}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:1px;background:var(--bd);
  border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:22px}
.kpi{background:var(--bg2);padding:14px 16px;min-width:0}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:5px}
.kpi-val{font-size:21px;font-weight:700;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:3px}

/* P&L strip */
.pnl-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:18px}
@media(max-width:860px){.pnl-strip{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.pnl-strip{grid-template-columns:1fr}}
.livedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g);margin-left:5px;vertical-align:middle;animation:pulse 1.8s infinite}
.livedot.off{background:var(--t4);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* tab bar */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:22px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--t3);cursor:pointer;border:none;
  background:none;position:relative;white-space:nowrap;min-height:44px;letter-spacing:0.2px}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--t1)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--t1)}

/* cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-lg);
  padding:20px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.card-h{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.card-note{font-size:12px;color:var(--t3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:700;margin:6px 0 10px}

/* filter buttons */
.fbtn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);
  background:var(--bg2);color:var(--t3);min-height:32px}
.fbtn.active{background:var(--t1);color:var(--bg2);border-color:var(--t1)}
.fbtn:hover:not(.active){border-color:var(--t2);color:var(--t2)}
.fbtns{display:flex;gap:6px;flex-wrap:wrap}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{padding:9px 10px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;
  color:var(--t3);font-weight:700;border-bottom:2px solid var(--bd);background:var(--bg3);white-space:nowrap}
.tbl tbody tr{border-bottom:1px solid var(--bd)}
.tbl tbody tr:hover{background:var(--bg-hover)}
.tbl tbody td{padding:9px 10px;vertical-align:middle}
.tbl .r{text-align:right;font-variant-numeric:tabular-nums} .tbl .c{text-align:center}
.tbl tr.sum{font-weight:700;background:var(--bg3)}
.tbl .num{font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums}

/* misc chips */
.dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle}
.sl-chip{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:700;color:#fff}
.bar-track{background:var(--bg4);border-radius:4px;height:8px;overflow:hidden;min-width:48px}
.bar-fill{height:100%;border-radius:4px}
.chart{width:100%}
.footer{margin-top:30px;padding-top:18px;border-top:1px solid var(--bd);font-size:11.5px;color:var(--t3);line-height:1.6}
.kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px}
.kv .k{color:var(--t3)} .kv .v{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.callout{background:var(--bg3);border-left:3px solid var(--bd-strong);padding:12px 16px;border-radius:6px;font-size:13px;color:var(--t2);line-height:1.6}
.loading{padding:80px 20px;text-align:center;color:var(--t3);font-size:15px}
.hint{background:var(--b-bg);border:1px solid var(--b-bg2);color:var(--b);font-size:12.5px;padding:9px 14px;border-radius:8px;margin-bottom:14px}
.row-exp{cursor:pointer}
.row-exp:hover{background:var(--bg-hover)}
.exp-ind{display:inline-block;width:12px;color:var(--t3);font-size:9px}
.exp-cell{background:var(--bg3);padding:0 !important}
.exp-panel{padding:16px 18px}
.chip{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;margin:0 6px 8px 0;background:var(--bg2);border:1px solid var(--bd);font-variant-numeric:tabular-nums}
.chip-bull{background:var(--g-bg);color:var(--g);border-color:rgba(26,135,84,0.3)}
.chip-bear{background:var(--r-bg);color:var(--r);border-color:rgba(192,57,43,0.3)}

@media(max-width:1100px){.kpi-strip{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
@media(max-width:560px){.kpi-strip{grid-template-columns:repeat(2,1fr)}body{padding:0 12px 50px}.mh-left h1{font-size:27px}}
</style>
</head>
<body>
<div class="shell">
  <div id="staleBanner" class="stale-banner" style="display:none"></div>
  <div class="masthead">
    <div class="mh-left">
      <h1 id="mhTitle">Navigo Systematic Trend</h1>
      <div class="mh-sub" id="mhSub">Systematic breadth- and trend-driven global ETF rotation</div>
    </div>
    <div class="mh-right" id="mhRight"></div>
  </div>
  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="tabContent"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
"use strict";
/* ============================ config + state ============================ */
const DATA_FILE = 'data/portfolio-navigo-systematic-trend.json';
let DS = null;
const state = { tab:'overview', perfWindow:'YTD', perfLog:false, attrHorizon:'1M', attrView:'theme', riskWindow:'SI', benchmarks:null, ovDonut:'sleeve', ovMoversHz:'1W' };
const PALETTE = ['#2563eb','#1a8754','#b45309','#7c3aed','#0891b2','#be185d','#a16207','#16a34a','#9333ea','#0d9488','#dc2626','#8a8a82'];

const TABS = [
  ['overview','Overview'], ['attribution','Attribution'], ['allocation','Allocation'], ['performance','Performance'],
  ['risk','Risk & Regime'], ['signals','Signals'], ['health','Data Health'], ['method','Methodology'],
];
const SLEEVE_COLORS = {A:'#2563eb',B:'#1a8754',C:'#b45309',D:'#7c3aed',TILT:'#0891b2',CASH:'#8a8a82'};

/* ============================ formatting ============================ */
const isNum = v => v!==null && v!==undefined && isFinite(v);
function pct(v,d=1){ if(!isNum(v)) return '—'; let z=v*100; if(Math.abs(z)<Math.pow(10,-d)/2) z=0; return z.toFixed(d)+'%'; }
function pctSigned(v,d=1){ if(!isNum(v)) return '—'; let z=v*100; if(Math.abs(z)<Math.pow(10,-d)/2) z=0; return (z>=0?'+':'')+z.toFixed(d)+'%'; }
const num = (v,d=2) => isNum(v) ? v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}) : '—';
const xfmt = (v,d=2) => isNum(v) ? v.toFixed(d)+'×' : '—';
const signClass = v => !isNum(v) ? '' : v>0 ? 'pos' : v<0 ? 'neg' : '';
const colored = (txt,v) => `<span class="${signClass(v)}">${txt}</span>`;
function fmtDate(s){ if(!s) return '—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateShort(s){ if(!s) return '—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============================ Plotly base ============================ */
const PLOT_FONT = {family:'DM Sans',size:11,color:'#5c5c56'};
function baseLayout(extra){
  return Object.assign({
    margin:{t:12,b:38,l:54,r:18}, paper_bgcolor:'transparent', plot_bgcolor:'transparent',
    font:PLOT_FONT, hovermode:'x unified', showlegend:false,
    xaxis:{gridcolor:'#ededea',tickfont:{size:10},zeroline:false},
    yaxis:{gridcolor:'#ededea',tickfont:{size:10,family:'JetBrains Mono'},zeroline:false},
  }, extra||{});
}
const PLOT_CFG = {displayModeBar:false, responsive:true};
function plot(el, traces, layout){ Plotly.react(el, traces, layout, PLOT_CFG); }

/* ============================ data loading ============================ */
async function bootstrap(){
  try{
    const resp = await fetch(DATA_FILE, {cache:'no-cache'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    DS = await resp.json();
  }catch(e){
    document.getElementById('tabContent').innerHTML =
      `<div class="loading">Could not load <code>${DATA_FILE}</code>.<br><span class="muted">${esc(e.message)}</span><br><br>
       Run <code>python scripts/pipeline.py</code> then serve from the project root or <code>docs/</code>.</div>`;
    return;
  }
  state.benchmarks = Object.keys(DS.equity.benchmarks||{}).filter(k=>DS.equity.benchmarks[k].default);
  if(!state.benchmarks.length) state.benchmarks=['SPY'];
  renderMasthead(); renderKPIs(); renderStaleBanner(); renderTabBar(); renderFooter(); renderTab();
}

/* ============================ masthead / KPIs ============================ */
function renderMasthead(){
  const m=DS.meta, rg=DS.regime;
  document.getElementById('mhTitle').textContent = m.name;
  document.getElementById('mhSub').textContent = m.descriptor + ' · weekly-rebalanced · since '+fmtDate(m.inception);
  const onoff = rg.state==='RISK_ON' ? 'on':'off';
  const hl = DS.health.level;
  document.getElementById('mhRight').innerHTML = [
    `<span class="pill pill-paper" title="Paper / model portfolio — not live capital">● Paper model</span>`,
    `<span class="pill pill-${onoff}" title="Breadth de-risk gate state">${rg.state==='RISK_ON'?'Risk-On':'Risk-Off'}</span>`,
    `<span class="pill" title="Latest model NAV date">As of ${fmtDateShort(m.live_asOf||m.asOf)}</span>`,
    `<span class="pill pill-health-${hl}" title="Data-integrity status">${hl==='ok'?'✓ Data OK':hl==='warn'?'⚠ Check data':'✕ Stale'}</span>`,
  ].join('');
}

function kpiCard(label,val,sub,cls){
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-val ${cls||''}">${val}</div><div class="kpi-sub">${sub||''}</div></div>`;
}
function renderKPIs(){
  const s=DS.stats, rg=DS.regime;
  const pr=s.period_returns;
  const spyYtd = (((s.benchmark_stats||{}).SPY||{}).period_returns||{}).YTD;
  const exYtd = (isNum(pr.YTD)&&isNum(spyYtd)) ? pr.YTD - spyYtd : null;
  const html = [
    kpiCard('vs S&P 500', pctSigned(exYtd), 'YTD excess', signClass(exYtd)),
    kpiCard('YTD', pctSigned(pr.YTD), isNum(spyYtd)?('S&P '+pctSigned(spyYtd)):'calendar', signClass(pr.YTD)),
    kpiCard('1 Year', pctSigned(pr['1Y']), 'trailing', signClass(pr['1Y'])),
    kpiCard('CAGR', pct(s.cagr), 'since inception'),
    kpiCard('Ann. Vol', pct(s.ann_vol), 'daily, ×√252'),
    kpiCard('Sharpe', num(s.sharpe,2), 'rf = 0'),
    kpiCard('Max DD', pct(s.max_dd), 'now '+pct(s.current_dd), 'neg'),
    kpiCard('Breadth', pct(rg.breadth,0), rg.state==='RISK_ON'?'risk-on':'risk-off', rg.state==='RISK_ON'?'pos':'neg'),
  ].join('');
  document.getElementById('kpiStrip').innerHTML = html;
}

function renderStaleBanner(){
  const h=DS.health, el=document.getElementById('staleBanner');
  if(h.level==='ok'){ el.style.display='none'; return; }
  el.className='stale-banner '+(h.level==='stale'?'stale':'warn');
  el.style.display='flex';
  el.innerHTML = `<span>${h.level==='stale'?'✕':'⚠'}</span><span>${h.level==='stale'?'DATA INTEGRITY':'DATA CHECK'} — `+
    esc(h.messages.join(' · ')||'a feed is approaching its freshness budget')+
    ` &nbsp;<a href="#" onclick="setTab('health');return false;">See Data Health →</a></span>`;
}

/* ============================ tab nav ============================ */
function renderTabBar(){
  document.getElementById('tabBar').innerHTML = TABS.map(([k,label])=>
    `<button class="tab ${state.tab===k?'active':''}" data-tab="${k}">${label}</button>`).join('');
  document.getElementById('tabBar').onclick = e=>{ const b=e.target.closest('.tab'); if(b) setTab(b.dataset.tab); };
}
function setTab(k){ state.tab=k; renderTabBar(); renderTab(); window.scrollTo({top:0,behavior:'smooth'}); }
function renderTab(){
  const fn = ({overview:renderOverview, allocation:renderAllocation, performance:renderPerformance,
    attribution:renderAttribution, risk:renderRisk, signals:renderSignals, health:renderHealth,
    method:renderMethod})[state.tab] || (()=>'');
  document.getElementById('tabContent').innerHTML = '<div></div>';
  fn();
}

/* ============================ equity chart builder ============================ */
function sliceWindow(dates, key){
  const n=dates.length, last=new Date(dates[n-1]+'T00:00:00');
  if(key==='SI') return 0;
  if(key==='YTD'){ const ys=dates.findIndex(d=>d.slice(0,4)===dates[n-1].slice(0,4)); return Math.max(0,ys-1); }
  const days={'1M':30,'3M':91,'6M':183,'1Y':365,'3Y':1095}[key]||99999;
  const cut=new Date(last); cut.setDate(cut.getDate()-days);
  let i=dates.findIndex(d=> new Date(d+'T00:00:00')>=cut); return i<0?0:i;
}
function cumFrom(arr, i0){ const base=arr[i0]; return arr.map((v,i)=> i<i0?null : (v/base-1)); }
function ddFrom(arr, i0){ let peak=-Infinity; return arr.map((v,i)=>{ if(i<i0) return null; peak=Math.max(peak,v); return v/peak-1; }); }

function buildEquityChart(elId, opt){
  opt=opt||{}; state._eqCfg={elId, opt}; const eq=DS.equity, win=opt.window||'SI', log=!!opt.log;
  let dates=eq.dates.slice(), model=eq.model.slice();
  if(eq.live && opt.showLive!==false){ dates=dates.concat(eq.live.dates); model=model.concat(eq.live.equity); }
  const i0=sliceWindow(dates,win), startDate=dates[i0], endDate=dates[dates.length-1], base=model[i0];
  const cum=(v,b)=> v==null?null : (log? v/b : (v/b-1)*100);  // rebase to the window start
  const traces=[];
  traces.push({type:'scatter',mode:'lines',name:'Model',x:dates,y:model.map((v,i)=> i<i0?null:cum(v,base)),
    line:{color:'rgba(26,135,84,0.95)',width:2.2}, fill:log?'none':'tozeroy', fillcolor:'rgba(26,135,84,0.06)',
    hovertemplate:'%{x|%-d %b %Y}<br><b>Model</b> %{y:.1f}'+(log?'×':'%')+'<extra></extra>'});
  if(eq.live && opt.showLive!==false){
    const lx=[eq.live.anchor_date].concat(eq.live.dates);
    const ly=[eq.live.anchor_equity].concat(eq.live.equity).map(v=>cum(v,base));
    traces.push({type:'scatter',mode:'lines+markers',name:'Live (MTM)',x:lx,y:ly,
      line:{color:'rgba(26,135,84,0.95)',width:2,dash:'dot'},marker:{size:5},
      hovertemplate:'%{x|%-d %b %Y}<br><b>Live MTM</b> %{y:.1f}'+(log?'×':'%')+'<extra></extra>'});
  }
  if(opt.showBenchmarks!==false){
    (state.benchmarks||['SPY']).forEach(k=>{ const bm=eq.benchmarks[k]; if(!bm) return;
      let i0b=bm.dates.findIndex(d=> d>=startDate); if(i0b<0) i0b=0; const bbase=bm.equity[i0b];
      traces.push({type:'scatter',mode:'lines',name:bm.label||k,x:bm.dates,y:bm.equity.map((v,i)=> i<i0b?null:cum(v,bbase)),line:{color:bm.color||'#8a8a82',width:1.3},
        hovertemplate:'%{x|%-d %b %Y}<br>'+(bm.label||k)+' %{y:.1f}'+(log?'×':'%')+'<extra></extra>'});
    });
  }
  const layoutExtra={ showlegend:true, legend:{orientation:'h',x:0,y:1.09,font:{size:11}},
    xaxis:{gridcolor:'#ededea',tickfont:{size:10},zeroline:false,range:[startDate,endDate]},
    yaxis:{gridcolor:'#ededea',tickfont:{size:10,family:'JetBrains Mono'},ticksuffix:log?'×':'%',zeroline:!log,zerolinecolor:'#cfcdc4'} };
  if(log) layoutExtra.yaxis.type='log';
  if(opt.showDrawdown){
    const dd=ddFrom(model,i0).map(v=> v===null?null:v*100);
    const ddmin=Math.min(...dd.filter(isNum)); const ddabs=isFinite(ddmin)?Math.abs(ddmin):1;
    traces.push({type:'scatter',mode:'lines',name:'Drawdown',x:dates,y:dd,yaxis:'y2',

/* ---- live intraday (mirrors Portfolio Command Centre: Yahoo chart API via CORS proxy) ---- */
const PROXIES = [ u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`, u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` ];
let _intraTimer=null;
async function _yfQuote(sym){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=5d&interval=1d&_cb=${Date.now()}`;
  for(const p of PROXIES){
    try{ const r=await fetch(p(url),{cache:'no-store'}); if(!r.ok) continue; const j=await r.json();
      const m=j&&j.chart&&j.chart.result&&j.chart.result[0]&&j.chart.result[0].meta; if(!m) continue;
      const price=m.regularMarketPrice, prev=(m.regularMarketPreviousClose!=null?m.regularMarketPreviousClose:(m.previousClose!=null?m.previousClose:m.chartPreviousClose));
      if(isNum(price)&&isNum(prev)&&prev) return {ret:price/prev-1, t:m.regularMarketTime};
    }catch(e){}
  }
  return null;
}
async function _pool(items, fn, n=5){
  const out=new Array(items.length); let i=0;
  const worker=async()=>{ while(i<items.length){ const idx=i++; out[idx]=await fn(items[idx]); } };
  await Promise.all(Array.from({length:Math.min(n,items.length)}, worker));
  return out;
}
function startIntraday(){ if(_intraTimer){clearInterval(_intraTimer);_intraTimer=null;} refreshIntraday(); _intraTimer=setInterval(refreshIntraday, 60000); }
async function refreshIntraday(){
  const card=document.getElementById('ovIntraday');
  if(!card){ if(_intraTimer){clearInterval(_intraTimer);_intraTimer=null;} return; }   // left Overview
  const rows=DS.weights.rows.filter(r=>(r.weight||0)>1e-4);
  const quotes=await _pool(rows, r=>_yfQuote(r.tradeAs||r.ticker), 5);
  const spyQ=await _yfQuote('SPY');
  const valEl=document.getElementById('intraVal'), subEl=document.getElementById('intraSub'), dot=document.getElementById('liveDot');
  if(!valEl) return;
  let pnl=0, cov=0, tmax=0;
  quotes.forEach((q,i)=>{ if(q&&isNum(q.ret)){ pnl+=(rows[i].weight||0)*q.ret; cov+=(rows[i].weight||0); if(q.t) tmax=Math.max(tmax,q.t); } });
  if(cov<0.01){ valEl.textContent='—'; valEl.className='kpi-val muted'; subEl.textContent='live unavailable'; if(dot) dot.className='livedot off'; return; }
  const ex=(spyQ&&isNum(spyQ.ret))? pnl-spyQ.ret : null;
  valEl.textContent=pctSigned(pnl,2); valEl.className='kpi-val '+signClass(pnl);
  if(dot) dot.className='livedot';
  const asOf=tmax? new Date(tmax*1000):null;
  const recent=asOf && (Date.now()-asOf.getTime() < 18*3600*1000);
  const tstr=asOf? (recent?'live ':'last ')+asOf.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : 'live';
  subEl.innerHTML=(spyQ&&isNum(spyQ.ret)?`SPY ${pctSigned(spyQ.ret,2)} · vs SPY <span class="${signClass(ex)}">${pctSigned(ex,2)}</span> · `:'')+tstr+(cov<0.95?` · ${Math.round(cov*100)}% cov`:'');
}

/* ============================ client-side stats (model + benchmarks) ============================ */
const mean = a => a.reduce((x,y)=>x+y,0)/(a.length||1);
function arrReturns(eq){ const r=[]; for(let i=1;i<eq.length;i++){ if(isNum(eq[i])&&isNum(eq[i-1])&&eq[i-1]) r.push(eq[i]/eq[i-1]-1);} return r; }
function statsOf(eq, dates){
  const idx=eq.map((v,i)=>i).filter(i=>isNum(eq[i]));
  if(idx.length<2) return {};
  const i0=idx[0], i1=idx[idx.length-1];
  const r=arrReturns(eq.slice(i0,i1+1));
  const days=(new Date(dates[i1]+'T00:00:00')-new Date(dates[i0]+'T00:00:00'))/86400000;
  const m=mean(r), sd=Math.sqrt(mean(r.map(x=>(x-m)**2))*r.length/Math.max(1,r.length-1));
  const dn=r.filter(x=>x<0), dsd=Math.sqrt(mean(dn.map(x=>x*x))||0);
  let peak=-Infinity,mdd=0; for(let i=i0;i<=i1;i++){ if(!isNum(eq[i])) continue; peak=Math.max(peak,eq[i]); mdd=Math.min(mdd,eq[i]/peak-1);}
  const cagr=Math.pow(eq[i1]/eq[i0],365.25/days)-1;
  return {totret:eq[i1]/eq[i0]-1, cagr, vol:sd*Math.sqrt(252), sharpe:sd?m/sd*Math.sqrt(252):null,
    sortino:dsd?m/dsd*Math.sqrt(252):null, maxdd:mdd, calmar:mdd?cagr/Math.abs(mdd):null,
    hit:r.filter(x=>x>0).length/r.length, best:Math.max(...r), worst:Math.min(...r)};
}
function rollingSeries(eq, dates, win){
  const ret=[], vol=[], x=[];
  for(let i=win;i<eq.length;i++){ if(!isNum(eq[i])||!isNum(eq[i-win])) continue;
    x.push(dates[i]); ret.push(eq[i]/eq[i-win]-1);
    const r=arrReturns(eq.slice(i-win,i+1)); const m=mean(r); const sd=Math.sqrt(mean(r.map(v=>(v-m)**2)));
    vol.push(sd*Math.sqrt(252)); }
  return {x,ret,vol};
}

function pearson(a,b){ const n=Math.min(a.length,b.length); const x=a.slice(0,n),y=b.slice(0,n);
  const mx=mean(x),my=mean(y); let sxy=0,sx=0,sy=0; for(let i=0;i<n;i++){ const dx=x[i]-mx,dy=y[i]-my; sxy+=dx*dy; sx+=dx*dx; sy+=dy*dy; }
  return (sx&&sy)? sxy/Math.sqrt(sx*sy):null; }
function buildCorrMatrix(elId){
  const eq=DS.equity; const ser={Model:eq.model}; Object.keys(eq.sleeves).forEach(k=> ser[k]=eq.sleeves[k]);
  const keys=Object.keys(ser); const rets={}; keys.forEach(k=> rets[k]=arrReturns(ser[k]));
  const cell=v=>{ if(!isNum(v)) return '<td></td>'; const a=Math.abs(v); const col= v>0?`rgba(37,99,235,${a*0.7+0.05})`:`rgba(192,57,43,${a*0.7+0.05})`;
    return `<td class="num" style="background:${col};text-align:center;color:${a>0.6?'#fff':'var(--t1)'}">${v.toFixed(2)}</td>`; };
  const head=`<tr><th></th>${keys.map(k=>`<th class="c">${k}</th>`).join('')}</tr>`;
  const body=keys.map(k1=>`<tr><td><strong>${k1}</strong></td>${keys.map(k2=>cell(pearson(rets[k1],rets[k2]))).join('')}</tr>`).join('');
  document.getElementById(elId).innerHTML=`<table class="tbl" style="font-size:12px"><thead>${head}</thead><tbody>${body}</tbody></table>
    <div class="card-note" style="margin-top:8px">Lower cross-sleeve correlation is the diversification engine. Model row reflects the blend.</div>`;
}

function sparkSVG(ticker){
  const h=(DS.holdings_prices||{})[ticker]; if(!h||!h.close) return '<span class="muted">—</span>';
  const close=h.close, ma=h.ma200||[], n=close.length, W=120,H=26,pad=2;
  const vals=close.filter(isNum); if(vals.length<3) return '<span class="muted">—</span>';
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=(mx-mn)||1;
  const X=i=> pad+(i/(n-1))*(W-2*pad), Y=v=> H-pad-((v-mn)/rng)*(H-2*pad);
  let segs=[],cur=null,sign=null;
  for(let i=0;i<n;i++){ if(!isNum(close[i])) continue;
    const s=(isNum(ma[i])&&close[i]>=ma[i])?1:-1;
    if(s!==sign){ if(cur&&cur.length) segs.push({s:sign,pts:cur}); cur=[]; sign=s; if(i>0&&isNum(close[i-1])) cur.push([X(i-1),Y(close[i-1])]); }
    cur.push([X(i),Y(close[i])]); }
  if(cur&&cur.length) segs.push({s:sign,pts:cur});
  const polys=segs.map(g=>`<polyline fill="none" stroke="${g.s>=0?'#1a8754':'#c0392b'}" stroke-width="1.3" points="${g.pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}"/>`).join('');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="vertical-align:middle" title="1-year price; green = above 200-day MA, red = below">${polys}</svg>`;
}
function trendBar(v){ if(!isNum(v)) return '<span class="muted">—</span>';
  const pc=(v*100); const w=Math.min(50,Math.abs(pc)*1.5); const col=v>=0?'#1a8754':'#c0392b';

    </span></span>`;
}
